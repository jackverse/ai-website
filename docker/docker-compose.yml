version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ai-website-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: renren_security
      MYSQL_USER: renren
      MYSQL_PASSWORD: 123456
      TZ: Asia/Shanghai
      LANG: zh_CN.UTF-8
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - ai-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-website-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge